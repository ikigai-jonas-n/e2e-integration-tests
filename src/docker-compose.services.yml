# Node.js service definitions for the E2E test suite.
#
# The E2E orchestrator (bun test) parses this file alongside e2e-orchestrator.yml
# and spawns services natively with Bun.spawn for fast (sub-second) starts.
#
# This is also a valid Docker Compose file:
#   docker compose -f docker-compose.services.yml up
# runs everything containerised — useful for CI or isolated debugging.
#
# Service-level x-* fields carry orchestrator hints that Docker Compose ignores.
#   x-repo       worktree this service's source lives in
#   x-env-file   .env.*.example base file (relative to worktree root)
#   x-setup      one-time build commands (npm install / npm run build, cached by git hash)
#   x-bridge-env extra env applied on top when global.network is set

services:

  # ── slot-game-server ────────────────────────────────────────────────────────
  sgs-core:
    x-repo: slot-game-server
    x-env-file: .env.example
    x-setup:
      - npm install
      - npm run build
    x-bridge-env: {}

    command: node --enable-source-maps build/index.js
    environment:
      PORT: "9000"
      APP_ENV: DEV
      SLOT_GAME_API_SIGNATURE: rgs-local-signature
      APP_CLOUD_REGION: us-east-2
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f -s -m 2 http://127.0.0.1:9000/v1/service/healthcheck || exit 1"]
      interval: 1s
      timeout: 2s
      retries: 30
      start_period: 1s

  # ── remote-game-server ──────────────────────────────────────────────────────
  billing:
    x-repo: remote-game-server-game
    x-env-file: .env.billing.example
    x-setup:
      - npm install
      - npm run build
    x-bridge-env:
      QUEUE_HOST_NAMES: "kafka-region:9093"
      GLOBAL_QUEUE_HOST_NAMES: "kafka-global:9193"
      REDIS_HOST: redis-cluster
      JOB_LOCKER_HOST: redis-cluster
      MONGO_HOST: mongo-primary
      MONGO_PORT: "27017"
      DB_HOST: db
      DB_PORT: "5432"
      DB_SLAVE_HOST: db
      DB_SLAVE_PORT: "5432"
      S3_ENDPOINT: "http://rustfs:9000"

    command: node --enable-source-maps build/index.js
    environment:
      NODE_PATH: ./build
      SLOT_GAME_SERVICE_URL: "http://127.0.0.1:9000"
      MONEY_SERVICE_URL: "https://money-service.iki-cit.cc"
      PLAYER_SERVICE_URL: "https://player-service.iki-cit.cc"
      API_HUB_SERVICE_URL: "https://api-hub.iki-cit.cc"
      S3_ENDPOINT: "http://127.0.0.1:7002"
    ports:
      - "8080:8080"
    depends_on:
      kafka-region:
        condition: service_healthy
      kafka-global:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f -s -m 2 http://127.0.0.1:8080/v2/service/healthcheck || exit 1"]
      interval: 1s
      timeout: 2s
      retries: 30
      start_period: 1s

  game:
      x-repo: remote-game-server-game
      x-env-file: .env.game.example
      x-setup:
        - npm install
        - npm run build
      x-bridge-env:
        QUEUE_HOST_NAMES: "kafka-region:9093"
        GLOBAL_QUEUE_HOST_NAMES: "kafka-global:9193"
        REDIS_HOST: redis-cluster
        JOB_LOCKER_HOST: redis-cluster
        MONGO_HOST: mongo-primary
        MONGO_PORT: "27017"
        CORE_SLOT_RGS_SERVICE_URL: "http://billing:8080"
        SLOT_GAME_SERVICE_URL: "http://sgs-core:9000"
        SLOT_GAME_ACTIVITY_SERVICE_URL: "http://game-activity:8070"

      command: node --enable-source-maps build/index.js
      environment:
        NODE_PATH: ./build
        CORE_SLOT_RGS_SERVICE_URL: "http://127.0.0.1:8080"
        SLOT_GAME_SERVICE_URL: "http://127.0.0.1:9000"
        SLOT_GAME_ACTIVITY_SERVICE_URL: "http://127.0.0.1:8070"
        MONEY_SERVICE_URL: "https://money-service.iki-cit.cc"
        PLAYER_SERVICE_URL: "https://player-service.iki-cit.cc"
        API_HUB_SERVICE_URL: "https://api-hub-gs1.iki-cit.cc"
      ports:
        - "19080:19080"
      depends_on:
        billing:
          condition: service_healthy
        sgs-core:
          condition: service_healthy
        game-activity:
          condition: service_healthy
        kafka-region:
          condition: service_healthy
        kafka-global:
          condition: service_healthy
      healthcheck:
        test: ["CMD-SHELL", "curl -f -s -m 2 http://127.0.0.1:19080/v2/service/healthcheck || exit 1"]
        interval: 1s
        timeout: 2s
        retries: 30
        start_period: 1s

