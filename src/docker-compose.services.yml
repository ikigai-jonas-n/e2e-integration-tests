  #       billing:
  #         condition: service_healthy
  #       kafka-region:
  #         condition: service_healthy
  #       kafka-global:
  #         condition: service_healthy
  #     healthcheck:
  #       test: ["CMD-SHELL", "curl -f -s -m 2 http://127.0.0.1:7001/v2/service/healthcheck || exit 1"]
  #       interval: 1s
  #       timeout: 2s
