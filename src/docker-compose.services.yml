  game-activity:
    x-repo: remote-game-server-game
    x-env-file: .env.game-activity.example
    x-setup:
      - npm install
      - npm run build
    x-bridge-env:
      QUEUE_HOST_NAMES: "kafka-region:9093"
      REDIS_HOST: redis-cluster
      JOB_LOCKER_HOST: redis-cluster

    command: node --enable-source-maps build/index.js
    environment:
      NODE_PATH: ./build
    ports:
      - "8070:8070"
    depends_on:
      kafka-region:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f -s -m 2 http://127.0.0.1:8070/v2/service/healthcheck || exit 1"]
      interval: 1s
      timeout: 2s
      retries: 30
      start_period: 1s

  job-stale-rounds:
    x-repo: remote-game-server-game
    x-env-file: .env.job.example
    x-bridge-env:
      QUEUE_HOST_NAMES: "kafka-region:9093"
      REDIS_HOST: redis-cluster
      CORE_SLOT_RGS_SERVICE_URL: "http://billing:8080"
      SLOT_GAME_SERVICE_URL: "http://sgs-core:9000"

    command: node --enable-source-maps build/index.js -r play-stale-rounds
    environment:
      NODE_PATH: ./build
      RGS_PORT: "8090"
      CORE_SLOT_RGS_SERVICE_URL: "http://127.0.0.1:8080"
      SLOT_GAME_SERVICE_URL: "http://127.0.0.1:9000"
    ports:
      - "8090:8090"
    depends_on:
      billing:
        condition: service_healthy
      sgs-core:
        condition: service_healthy

  job-close-inactive:
    x-repo: remote-game-server-game
    x-env-file: .env.job.example
    x-bridge-env:
      QUEUE_HOST_NAMES: "kafka-region:9093"
      REDIS_HOST: redis-cluster
      CORE_SLOT_RGS_SERVICE_URL: "http://billing:8080"
      SLOT_GAME_SERVICE_URL: "http://sgs-core:9000"

    command: node --enable-source-maps build/index.js -r session-close-inactive-and-stale
    environment:
      NODE_PATH: ./build
      RGS_PORT: "8091"
      CORE_SLOT_RGS_SERVICE_URL: "http://127.0.0.1:8080"
      SLOT_GAME_SERVICE_URL: "http://127.0.0.1:9000"
    ports:
      - "8091:8091"
    depends_on:
      billing:
        condition: service_healthy
      sgs-core:
        condition: service_healthy

# NOTE: Observability tools (Seq, Dozzle) live in docker-compose.observability.yml.