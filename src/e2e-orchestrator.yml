global:
  # Where git worktrees for each repo are checked out
  worktreeBasePath: "./.e2e-worktrees"

  cleanOnTeardown: false
  verbose: false
  network: null

  # Defines the target game and RTP band for the test suite. 
  # All tests, clients, and API helpers sync to these values.
  testConfig:
    targetGameCode: "LGS-004"
    targetRtpCode: "RTP_97"

  # Suites to permanently skip by default (e.g. slow Kafka propagation flows)
  # Slugs: service-apis, internal-apis, experience-apis, flow-bet-action, 
  #        flow-lobby, flow-maintenance, flow-bridge
  skipSuites:
    # - internal-apis
    - flow-bridge

  # Global data flushing defaults on startup
  flushData:
    redis: true      # Clears deduced Redis namespaces
    # mongo: true      # Drops deduced Mongo databases
    # postgres: false  # Runs 'migrate down all'. Default false to speed up local boots.

# Git repos to check out as worktrees before starting services.
# target can be a branch name OR a version tag — both are supported.
# Multiple entries can point to the same repoPath with different targets.
# Each entry gets its own worktree directory and independent build cache.
repos:
  queue-service:
    repoPath: "../queue-service"
    target: "main"

  slot-game-server:
    repoPath: "../slot-game-server"
    target: "fix-sexyfruits-screen-generation"

  # remote-game-server — one worktree per version
  # services sharing the same worktree key share a single build (npm install + build runs once)
  # Each remote-game-server variant gets its own isolated Postgres (DB_NAME) and
  # MongoDB (MONGO_NAME) database so schema changes across versions never interfere.
  # Variants without DB credentials in their first service's env file use
  # migrationEnvFile to borrow billing's credentials (host/port/user/pass),
  # while envOverrides changes the database name to keep them isolated.

  remote-game-server-no-db:
    repoPath: "../remote-game-server"
    target: "1.15.1"                          # game-activity, job-stale-rounds, job-close-inactive
    migrationEnvFile: ".env.billing.example"  # first svc (game-activity) has no DB credentials
    envOverrides:
      DB_NAME: "slot_main"
      MONGO_NAME: "rgs_main"
    # Example of a granular override:
    # flushData:
    #   mongo: false
    alwaysRedoMigration: false
    skipMigration: true

  remote-game-server-billing:
    repoPath: "../remote-game-server"
    target: "LGRGS-483"                        # billing
    alwaysRedoMigration: false
    # uses billing env by default — has all DB credentials
    # DB_NAME=slot, MONGO_NAME=rgs (defaults from .env.billing.example)

  remote-game-server-bridge:
    repoPath: "../remote-game-server"
    target: "LGRGS-483"
    # target: "fix-bridge-version-mismatch"                         # bridge
    alwaysRedoMigration: false
    migrationEnvFile: ".env.billing.example"  # bridge env has no DB credentials
    skipMigration: true

  remote-game-server-game:
    repoPath: "../remote-game-server"
    target: "LGRGS-483"                        # game
    alwaysRedoMigration: false
    migrationEnvFile: ".env.billing.example"  # game env may lack postgres credentials

# Observability tools started automatically alongside infra.
observability:
  # Seq structured log browser — receives ALL Node.js service logs via CLEF HTTP forwarding.
  # Logs persist across runs (Docker volume). Browse at http://localhost:8081
  # Toggle off for CI (file-based logs are sufficient there).
  seq: false

  # Dozzle live container log viewer — Docker containers only (Kafka, Postgres, Redis, etc.).
  # Node.js services run natively via Bun.spawn; use Seq for those.
  # Browse at http://localhost:9990
  dozzle: false

# Per docker-compose-container env overrides applied when global.network is set.
# These patch the advertised listeners in the infra containers for bridge networking.
composeServiceEnvOverrides:
  queue-service:
    kafka-region:
      KAFKA_CFG_ADVERTISED_LISTENERS: "INTERNAL://kafka-region:9092,EXTERNAL://kafka-region:9093,CONTROLLER://kafka-region:9094"
    kafka-global:
      KAFKA_CFG_ADVERTISED_LISTENERS: "INTERNAL://kafka-global:9092,EXTERNAL://kafka-global:9193,CONTROLLER://kafka-global:9094"
  remote-game-server:
    redis:
      _note: "Bridge mode requires --cluster-announce-hostname redis-cluster in Redis startup"
